<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>共有Todoリスト</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }

  .header {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
  }

  /* タイトル入力UI */
  .title-area {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .title-area input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
  }

  .title-area button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #34c759;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
  }

  /* URLタイトル表示 */
  .list-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: #f1f3f5;
    border-radius: 10px;
    text-align: center;
    color: #333;
  }

  .input-area {
    position: sticky;
    top: 0;
    background: #fff;
    padding-bottom: 12px;
    z-index: 10;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
  }

  .input-row button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #007aff;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
  }

  .list-header {
    margin: 10px 0;
    font-size: 0.85rem;
    color: #666;
    display: flex;
    justify-content: space-between;
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  li {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .done {
    background: #e9ecef;
    text-decoration: line-through;
    color: #777;
  }

  .todo-text {
    flex: 1;
    margin-left: 10px;
    font-size: 1rem;
  }

  .actions {
    display: flex;
    gap: 10px;
  }

  .actions button {
    border: none;
    background: transparent;
    font-size: 1.2rem;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    color: #999;
    margin-top: 20px;
  }

  /* 編集モーダル */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .modal-box {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }

  .modal-box input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 12px;
  }

  .modal-box button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #007aff;
    color: #fff;
    font-size: 1rem;
  }
</style>
</head>

<body>
<div class="app">
  <div class="header">共有Todoリスト</div>

  <!-- タイトル入力UI -->
  <div class="title-area">
    <input id="titleInput" type="text" placeholder="リスト名を入力（例：家族・仕事・買い物）" />
    <button id="createListBtn">リストを作成</button>
  </div>

  <!-- URLタイトル表示 -->
  <div id="listTitle" class="list-title"></div>

  <div class="input-area">
    <div class="input-row">
      <input id="todoInput" type="text" placeholder="やることを入力" />
      <button id="addBtn">追加</button>
    </div>
  </div>

  <div class="list-header">
    <span id="counter">0 件</span>
    <button id="clearDoneBtn">完了削除</button>
  </div>

  <ul id="todoList"></ul>
  <div id="emptyMessage" class="empty">まだTodoがありません</div>
</div>

<!-- 編集モーダル -->
<div id="editModal" class="modal">
  <div class="modal-box">
    <input id="editInput" type="text" />
    <button id="saveEditBtn">保存</button>
  </div>
</div>

<script>
// URLからlistIDを取得
const params = new URLSearchParams(window.location.search);
const listID = params.get("list") || "default";
const STORAGE_KEY = "todo_list_" + listID;

// URLタイトル表示
const listTitleEl = document.getElementById("listTitle");
listTitleEl.textContent = listID === "default" ? "デフォルトリスト" : listID;

// タイトル入力 → URL生成
document.getElementById("createListBtn").addEventListener("click", () => {
  const title = document.getElementById("titleInput").value.trim();
  if (!title) return;

  const id = encodeURIComponent(title.toLowerCase());
  window.location.href = `?list=${id}`;
});

let todos = [];
let editIndex = null;

const todoInput = document.getElementById("todoInput");
const addBtn = document.getElementById("addBtn");
const todoListEl = document.getElementById("todoList");
const counterEl = document.getElementById("counter");
const emptyMessageEl = document.getElementById("emptyMessage");
const clearDoneBtn = document.getElementById("clearDoneBtn");

const editModal = document.getElementById("editModal");
const editInput = document.getElementById("editInput");
const saveEditBtn = document.getElementById("saveEditBtn");

function loadTodos() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) todos = JSON.parse(raw);
}

function saveTodos() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
}

function renderTodos() {
  todoListEl.innerHTML = "";

  if (todos.length === 0) {
    emptyMessageEl.style.display = "block";
    counterEl.textContent = "0 件";
    return;
  }

  emptyMessageEl.style.display = "none";
  counterEl.textContent = `${todos.length} 件`;

  todos.forEach((todo, index) => {
    const li = document.createElement("li");
    if (todo.done) li.classList.add("done");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = todo.done;
    checkbox.addEventListener("change", () => {
      todos[index].done = checkbox.checked;
      saveTodos();
      renderTodos();
    });

    const text = document.createElement("div");
    text.className = "todo-text";
    text.textContent = todo.text;

    const actions = document.createElement("div");
    actions.className = "actions";

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.addEventListener("click", () => {
      editIndex = index;
      editInput.value = todo.text;
      editModal.style.display = "flex";
    });

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "🗑️";
    deleteBtn.addEventListener("click", () => {
      todos.splice(index, 1);
      saveTodos();
      renderTodos();
    });

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    li.appendChild(checkbox);
    li.appendChild(text);
    li.appendChild(actions);

    todoListEl.appendChild(li);
  });
}

function addTodo() {
  const text = todoInput.value.trim();
  if (!text) return;
  todos.push({ text, done: false });
  todoInput.value = "";
  saveTodos();
  renderTodos();
}

addBtn.addEventListener("click", addTodo);
todoInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") addTodo();
});

clearDoneBtn.addEventListener("click", () => {
  todos = todos.filter(t => !t.done);
  saveTodos();
  renderTodos();
});

saveEditBtn.addEventListener("click", () => {
  const newText = editInput.value.trim();
  if (!newText) return;
  todos[editIndex].text = newText;
  saveTodos();
  renderTodos();
  editModal.style.display = "none";
});

editModal.addEventListener("click", (e) => {
  if (e.target === editModal) editModal.style.display = "none";
});

loadTodos();
renderTodos();
</script>
</body>
</html>
